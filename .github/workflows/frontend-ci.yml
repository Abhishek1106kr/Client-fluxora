name: Fluxora CI/CD Production Pipeline

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  # STEP 1: Core Test Suite Gate (Blocks broken code from merging)
  continuous-integration:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code Base
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22' # Use the same version as Dockerfile
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Verify Test Files Exist
        run: |
          ls -l src/components/tests/
          ls -l src/components/fileUpload.test.jsx

      - name: Verify Imports in Component Files
        run: |
          grep -r "@testing-library/jest-dom" src/components/tests/
          grep -r "@testing-library/react" src/components/tests/
          docker run --rm fluxora-fe-test

  # STEP 2: Automatic Vercel Deployment (Triggers ONLY when tests pass)
  continuous-deployment:
    needs: continuous-integration
    runs-on: ubuntu-latest
    # Run preview deployment on PRs, run production deployment on final merge to main
    steps:
      - name: Checkout Code Base
        uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Pull Vercel Environment Configuration
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Build Project Artifacts via Vercel CLI
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Deploy Prebuilt Artifact to Vercel Production
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Deploy Prebuilt Artifact to Vercel Preview
        if: github.event_name == 'pull_request'
        run: vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}